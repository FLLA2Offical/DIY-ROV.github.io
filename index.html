<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Team 69309 Collegiate Dutchmen</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              heading: ['Sora', 'sans-serif'],
              body: ['Manrope', 'sans-serif']
            }
          }
        }
      };
    </script>

    <link rel="stylesheet" href="styles.css?v=20260309e" />

    <script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>

    <script defer src="auth.js?v=20260309e"></script>
    <script defer src="builder.js?v=20260309e"></script>
  </head>
  <body class="font-body">
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <header class="mt-4 w-full px-3 sm:px-4">
      <div class="glass-panel flex flex-wrap items-center justify-between gap-4 px-5 py-4 md:px-6">
        <div>
          <p class="font-heading text-sm uppercase tracking-[0.2em] text-slate-500">FIRST LEGO League</p>
          <h1 id="siteHeading" class="font-heading text-xl text-slate-900 sm:text-2xl">Team 69309 Collegiate Dutchmen</h1>
        </div>
        <div id="pageTabs" class="flex flex-wrap gap-2"></div>
        <div class="flex items-center gap-2">
          <button id="openAdminLoginBtn" class="secondary-btn !px-3 !py-2 text-xs uppercase tracking-[0.08em]" type="button">
            Admin Login
          </button>
          <span id="adminStateBadge" class="status-pill">Visitor View</span>
        </div>
      </div>
    </header>

    <main class="w-full px-3 pb-24 pt-4 sm:px-4 sm:pt-5">
      <div id="siteContent" class="space-y-8"></div>
    </main>

    <button id="adminHotspot" class="admin-hotspot" type="button" aria-label="Open admin login"></button>

    <div id="adminLoginModal" class="modal-backdrop hidden" role="dialog" aria-modal="true">
      <div class="modal-panel w-[min(420px,92vw)]">
        <div class="flex items-center justify-between">
          <h2 class="font-heading text-xl text-slate-900">Admin Access</h2>
          <button id="closeLoginModal" type="button" class="icon-btn" aria-label="Close">&#10005;</button>
        </div>
        <p class="mt-3 text-sm text-slate-600">Use the team password or Sign in with Google to unlock edit mode.</p>

        <form id="adminLoginForm" class="mt-5 space-y-3">
          <label class="text-sm font-semibold text-slate-700" for="adminPassword">Password</label>
          <input
            id="adminPassword"
            type="password"
            autocomplete="current-password"
            class="input-field"
            placeholder="Enter admin password"
            required
          />
          <p id="loginError" class="hidden rounded-xl bg-red-50 px-3 py-2 text-sm text-red-700"></p>

          <div class="flex flex-wrap gap-2 pt-1">
            <button type="submit" class="primary-btn">Unlock Editor</button>
            <button id="googleLoginBtn" type="button" class="secondary-btn hidden">Sign in with Google</button>
          </div>
        </form>
      </div>
    </div>

    <div id="adminToolbar" class="admin-toolbar hidden">
      <div class="mx-auto flex w-[min(1200px,96vw)] flex-wrap items-center gap-2 px-3 py-3">
        <button id="btnAddSection" class="tool-btn" type="button">Add Section</button>
        <button id="btnAddTitle" class="tool-btn" type="button">Add Title</button>
        <button id="btnAddText" class="tool-btn" type="button">Add Text</button>
        <button id="btnAddImage" class="tool-btn" type="button">Add Image</button>
        <button id="btnAddGallery" class="tool-btn" type="button">Add Gallery</button>
        <button id="btnAddButton" class="tool-btn" type="button">Add Button</button>
        <button id="btnChangeColors" class="tool-btn" type="button">Change Colors</button>
        <button id="btnAddPage" class="tool-btn" type="button">Add Page</button>
        <button id="btnDeleteSection" class="tool-btn danger" type="button">Delete Section</button>
        <button id="btnEditSiteName" class="tool-btn" type="button">Edit Site Name</button>
        <button id="btnEditBanner" class="tool-btn" type="button">Edit Banner</button>
        <button id="btnChangeBannerImage" class="tool-btn" type="button">Change Banner Image</button>
        <button id="btnSave" class="tool-btn save" type="button">Save</button>
        <span id="saveStatus" class="save-status">Ready</span>

        <div class="mx-1 hidden h-7 w-px bg-slate-300/80 md:block"></div>

        <select id="pageSelect" class="input-field h-10 min-w-[180px] text-sm"></select>
        <button id="btnRenamePage" class="tool-btn" type="button">Rename Page</button>
        <button id="btnDeletePage" class="tool-btn danger" type="button">Delete Page</button>
        <button id="btnLogout" class="tool-btn" type="button">Exit Edit Mode</button>
      </div>
    </div>

    <div id="colorPanel" class="modal-backdrop hidden" role="dialog" aria-modal="true">
      <div class="modal-panel w-[min(520px,92vw)]">
        <div class="flex items-center justify-between">
          <h3 class="font-heading text-lg text-slate-900">Color Customizer</h3>
          <button id="closeColorPanel" type="button" class="icon-btn" aria-label="Close">&#10005;</button>
        </div>

        <div class="mt-4 grid gap-4 sm:grid-cols-2">
          <label class="color-field">
            <span>Primary Color</span>
            <input id="primaryColorInput" type="color" />
          </label>
          <label class="color-field">
            <span>Background</span>
            <input id="backgroundColorInput" type="color" />
          </label>
          <label class="color-field">
            <span>Text Color</span>
            <input id="textColorInput" type="color" />
          </label>
          <label class="color-field">
            <span>Button Color</span>
            <input id="buttonColorInput" type="color" />
          </label>
        </div>

        <div class="mt-6 flex justify-end">
          <button id="closeColorPanelBtn" class="primary-btn" type="button">Done</button>
        </div>
      </div>
    </div>

    <div id="imageUploadModal" class="modal-backdrop hidden" role="dialog" aria-modal="true">
      <div class="modal-panel w-[min(640px,94vw)]">
        <div class="flex items-center justify-between">
          <h3 id="imageModalTitle" class="font-heading text-lg text-slate-900">Upload Images</h3>
          <button id="closeImageUploadModal" type="button" class="icon-btn" aria-label="Close">&#10005;</button>
        </div>

        <div id="imageDropzone" class="dropzone mt-4">
          <p class="font-heading text-base text-slate-800">Drag and drop images here</p>
          <p class="mt-1 text-sm text-slate-500">or</p>
          <button id="chooseImagesBtn" type="button" class="secondary-btn mt-3">Choose Files</button>
          <input id="imageInput" class="hidden" type="file" accept="image/*" multiple />
          <p id="imageUploadHint" class="mt-3 text-xs text-slate-500">Supports JPG, PNG, WEBP.</p>
        </div>
      </div>
    </div>

    <div id="toastContainer" class="toast-container" aria-live="polite"></div>

  </body>
</html>
